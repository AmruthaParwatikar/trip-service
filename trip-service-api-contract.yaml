openapi: 3.0.0
info:
  title: Trip Service API
  version: 1.0.0
  description: API for managing trip lifecycle in ride-hailing system

servers:
  - url: http://localhost:3002

paths:
  /health:
    get:
      summary: Trip Service health check
      responses:
        '200':
          description: Service is running

  /metrics:
    get:
      summary: Trip Service metrics snapshot
      responses:
        '200':
          description: JSON metrics including request count, status codes, CPU, and memory

  /metrics/prometheus:
    get:
      summary: Trip Service Prometheus metrics
      responses:
        '200':
          description: Prometheus-formatted service metrics

  /v1/trips:
    post:
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rider_id:
                  type: integer
                pickup:
                  type: string
                drop:
                  type: string
                city:
                  type: string
      responses:
        '200':
          description: Trip created

  /v1/trips/{id}:
    get:
      summary: Get trip by ID
      parameters:
        - in: path
          name: id
          description: Numeric trip ID generated by Trip Service.
          required: true
          schema:
            type: string
            example: "101"
      responses:
        '200':
          description: Trip details

  /v1/trips/{id}/accept:
    post:
      summary: Accept trip
      parameters:
        - in: path
          name: id
          description: Numeric trip ID generated by Trip Service.
          required: true
          schema:
            type: string
            example: "101"
      responses:
        '200':
          description: Trip accepted

  /v1/trips/{id}/start:
    post:
      summary: Start trip
      parameters:
        - in: path
          name: id
          description: Numeric trip ID generated by Trip Service.
          required: true
          schema:
            type: string
            example: "101"
      responses:
        '200':
          description: Trip started

  /v1/trips/{id}/complete:
    post:
      summary: Complete trip and trigger payment
      parameters:
        - in: path
          name: id
          description: Numeric trip ID generated by Trip Service.
          required: true
          schema:
            type: string
            example: "101"
      responses:
        '200':
          description: Trip completed

  /v1/trips/{id}/status:
    get:
      summary: Get trip status by ID
      parameters:
        - in: path
          name: id
          description: Numeric trip ID generated by Trip Service.
          required: true
          schema:
            type: string
            example: "101"
      responses:
        '200':
          description: Plain-text trip status

  /v1/trips/{id}/cancel:
    post:
      summary: Cancel trip
      parameters:
        - in: path
          name: id
          description: Numeric trip ID generated by Trip Service.
          required: true
          schema:
            type: string
            example: "101"
      responses:
        '200':
          description: Trip cancelled

  /v1/trips/reports/riders/{riderId}:
    get:
      summary: Get rider trip report
      parameters:
        - in: path
          name: riderId
          description: Numeric rider ID.
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Rider trip history enriched with driver and payment details

  /v1/trips/reports/drivers/{driverId}:
    get:
      summary: Get driver trip report
      parameters:
        - in: path
          name: driverId
          description: Numeric driver ID.
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Driver trip history enriched with rider and payment details
